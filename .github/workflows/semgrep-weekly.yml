name: Weekly Semgrep Scan

on:
  schedule:
    # Run weekly at 1:00 AM on Sunday
    - cron: '0 1 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  semgrep-weekly:
    name: Weekly Full Semgrep Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Run Semgrep Full Scan
        run: uvx semgrep scan --config auto --sarif --output semgrep.sarif

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep-weekly
